<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频标注工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #ddd; font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: #111; padding: 10px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 20px; }
.header h2 { color: #00CC00; font-size: 18px; }
.main-container { display: flex; flex: 1; overflow: hidden; }
.left-panel { width: 380px; background: #16213e; border-right: 1px solid #333; padding: 12px; overflow-y: auto; max-height: calc(100vh - 50px); }
.right-panel { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; max-height: calc(100vh - 50px); }
.section { background: #0f3460; border: 1px solid #333; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
.section-title { font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #333; }
.row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
label { font-size: 12px; color: #aaa; white-space: nowrap; }
input[type=text], input[type=file], input[type=number] { background: #1a1a2e; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 5px 8px; font-size: 12px; outline: none; width: 100px; }
input:focus { border-color: #00CC00; }
input.wide { flex: 1; min-width: 80px; }
.btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s; }
.btn-primary { background: #00CC00; color: white; }
.btn-primary:hover { background: #009900; }
.btn-primary:disabled { background: #555; color: #888; cursor: not-allowed; }
.btn-secondary { background: #555; color: #fff; }
.btn-secondary:hover { background: #666; }
.btn-danger { background: #e74c3c; color: white; }
.btn-danger:hover { background: #c0392b; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.file-drop { border: 2px dashed #444; border-radius: 6px; padding: 16px; text-align: center; color: #888; font-size: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 6px; }
.file-drop:hover { border-color: #00CC00; background: rgba(0,204,0,0.05); }
.canvas-wrap { position: relative; display: inline-block; margin: 8px 0; border: 1px solid #333; border-radius: 4px; overflow: hidden; }
.canvas-wrap img { display: block; max-width: 100%; }
#mainCanvas { position: absolute; top: 0; left: 0; cursor: crosshair; background: transparent; }
.frame-nav { display: flex; align-items: center; gap: 4px; margin: 8px 0; flex-wrap: wrap; justify-content: center; }
.frame-nav .btn { min-width: 40px; }
.frame-display { background: #333; color: #fff; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; min-width: 60px; text-align: center; }
.progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin: 6px 0; }
.progress-fill { height: 100%; background: #00CC00; width: 0%; transition: width 0.3s; }
.log-area { background: #0a0a15; border: 1px solid #333; border-radius: 4px; padding: 6px; font-family: monospace; font-size: 11px; max-height: 100px; overflow-y: auto; color: #0f0; white-space: pre-wrap; }
.category-row { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
.category-row label { min-width: 70px; font-size: 11px; }
.category-row input { width: 100%; font-size: 11px; }
.trace-list { background: #0a0a15; border: 1px solid #333; border-radius: 4px; max-height: 80px; overflow-y: auto; margin-bottom: 4px; }
.trace-item { padding: 3px 6px; font-size: 11px; cursor: pointer; }
.trace-item:hover { background: #333; }
.trace-item.selected { background: #005500; }
.assign-row { display: flex; align-items: center; gap: 4px; justify-content: center; margin: 4px 0; }
.assign-row .btn { min-width: 28px; height: 28px; font-size: 16px; padding: 0; }
.assign-display { background: #2c3e50; color: #ecf0f1; padding: 4px 12px; border-radius: 4px; font-weight: bold; min-width: 70px; text-align: center; }
.checkbox-row { display: flex; align-items: center; gap: 6px; }
.checkbox-row input[type=checkbox] { width: 14px; height: 14px; }
.prompt-bbox-list { background: #0a0a15; border: 1px solid #333; border-radius: 4px; max-height: 60px; overflow-y: auto; margin-bottom: 4px; font-size: 11px; }
.prompt-bbox-item { padding: 2px 6px; }
</style>
</head>
<body>
<div class="header">
  <h2>视频标注工具</h2>
  <span style="color:#888;font-size:12px">与app.py功能同步</span>
</div>
<div class="main-container">
  <div class="left-panel">
    <div class="section">
      <div class="section-title">1. 视频标注</div>
      <div class="file-drop" id="videoDrop">点击或拖拽上传视频文件</div>
      <input type="file" id="videoFile" accept="video/*" style="display:none">
      <div class="row">
        <label>IoU:</label>
        <input type="text" id="iouInput" value="0.5" style="width:50px">
        <label>合并IoU:</label>
        <input type="text" id="mergeIouInput" value="0.5" style="width:50px">
      </div>
      <div class="row">
        <label>物品:</label>
        <input type="text" id="itemsInput" class="wide" placeholder="类别名称,逗号分隔">
      </div>
      <div class="row">
        <button class="btn btn-primary" id="annotateBtn" disabled>▶ 执行标注</button>
        <button class="btn btn-secondary" id="showViewerBtn" disabled>显示</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div id="progressText" style="font-size:11px;color:#888"></div>
    </div>

    <div class="section">
      <div class="section-title">2. 类别名称 (trace_id → 类别)</div>
      <div id="categoryList"></div>
    </div>

    <div class="section">
      <div class="section-title">3. 预览控制</div>
      <div class="row">
        <label>缩放:</label>
        <input type="range" id="zoomSlider" min="50" max="200" value="100" style="flex:1">
        <span id="zoomLabel">100%</span>
      </div>
      <div class="row">
        <label>置信度:</label>
        <input type="range" id="confSlider" min="0" max="100" value="50" style="flex:1">
        <span id="confLabel">50%</span>
      </div>
      <div class="frame-nav" id="frameNav" style="display:none">
        <button class="btn btn-secondary btn-sm" id="backwardFastBtn">倒播</button>
        <button class="btn btn-secondary btn-sm" id="backwardBtn">倒帧</button>
        <button class="btn btn-primary btn-sm" id="promptBtn">提示帧</button>
        <div class="checkbox-row">
          <input type="checkbox" id="backwardCb" checked>
          <label style="font-size:10px">后向</label>
        </div>
        <span class="frame-display" id="frameDisplay">1/1</span>
        <div class="checkbox-row">
          <input type="checkbox" id="forwardCb" checked>
          <label style="font-size:10px">前向</label>
        </div>
        <button class="btn btn-secondary btn-sm" id="forwardBtn">正帧</button>
        <button class="btn btn-secondary btn-sm" id="forwardFastBtn">正播</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">ID映射列表</div>
      <div class="trace-list" id="traceList"></div>
      <div class="row">
        <button class="btn btn-secondary btn-sm" id="clearTraceBtn">清空</button>
        <button class="btn btn-primary btn-sm" id="modifyTraceBtn">变更</button>
        <button class="btn btn-danger btn-sm" id="deleteTraceBtn">删除</button>
      </div>
      <div class="assign-row">
        <button class="btn btn-danger" id="decBtn">-</button>
        <span class="assign-display" id="assignDisplay">1000000</span>
        <button class="btn btn-primary" id="incBtn">+</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">双向标注</div>
      <div class="prompt-bbox-list" id="promptBboxList"></div>
      <div class="row">
        <button class="btn btn-primary" id="runBidirectionalBtn" disabled>执行双向标注</button>
      </div>
    </div>

    <div class="section">
      <button class="btn btn-primary" id="exportBtn" style="width:100%">📦 导出到 temp_data_post</button>
    </div>

    <div class="section">
      <div class="log-area" id="logArea"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="canvas-wrap" id="canvasWrap">
      <img id="videoImg" style="display:none">
      <canvas id="mainCanvas"></canvas>
    </div>
    <div class="row" id="videoInfo" style="display:none">
      <span style="color:#888;font-size:11px" id="videoInfoText"></span>
    </div>
  </div>
</div>

<script>
let state = {
  videoName: '',
  totalFrames: 0,
  currentFrame: 0,
  isPlaying: false,
  zoom: 1.0,
  conf: 0.5,
  nextTrackId: 1000000,
  traceList: [],
  promptBboxes: [],
  promptFrameIdx: -1,
  categoryMappings: ['Detect','Detect','Detect','Detect','Detect','Detect','Detect','Detect']
};
const WARM_COLORS = [[180,130,255],[200,100,220],[255,50,200],[255,0,180],[220,0,150],[180,0,120],[139,0,100],[100,0,80]];
const COLD_COLORS = [[100,150,255],[100,200,255],[150,200,255],[100,255,200],[150,100,255],[100,200,200],[150,150,255],[100,180,255]];
function getColor(trackId) {
  if (trackId >= 1000000) return WARM_COLORS[(trackId - 1000000) % 8];
  return COLD_COLORS[trackId % 8];
}
function log(msg) {
  const area = document.getElementById('logArea');
  area.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
  area.scrollTop = area.scrollHeight;
}
function updateProgress(percent, text) {
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = text || '';
}
document.getElementById('videoDrop').onclick = () => document.getElementById('videoFile').click();
document.getElementById('videoFile').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  const res = await fetch('/api/upload_video', {method:'POST', body:formData});
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  state.videoName = data.filename;
  document.getElementById('videoDrop').innerHTML = '已上传: ' + data.filename;
  document.getElementById('annotateBtn').disabled = false;
  document.getElementById('showViewerBtn').disabled = false;
  log('视频已上传: ' + data.filename + ' (' + data.width + 'x' + data.height + ')');
};
document.getElementById('annotateBtn').onclick = async () => {
  const formData = new FormData();
  formData.append('video_name', state.videoName);
  formData.append('iou', document.getElementById('iouInput').value);
  formData.append('merge_iou', document.getElementById('mergeIouInput').value);
  formData.append('items', document.getElementById('itemsInput').value);
  formData.append('boxes', JSON.stringify(state.promptBboxes));
  const es = new EventSource('/api/annotate_stream', {method:'POST', body:formData});
  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.type === 'start') { log('开始标注...'); updateProgress(0, '0%'); }
    if (d.type === 'progress') { updateProgress(d.percent, d.frame + '/' + d.total); }
    if (d.type === 'done') { log('标注完成: ' + d.frames + '帧'); updateProgress(100, '完成'); es.close(); }
    if (d.type === 'error') { log('错误: ' + d.msg); es.close(); }
  };
};
document.getElementById('showViewerBtn').onclick = async () => {
  const res = await fetch('/api/show_viewer', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({category_mappings:state.categoryMappings, trace_id_changes:state.traceList})});
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  state.totalFrames = data.frames;
  state.currentFrame = 0;
  document.getElementById('frameNav').style.display = 'flex';
  document.getElementById('videoInfo').style.display = 'flex';
  document.getElementById('videoInfoText').textContent = state.videoName + ' - ' + data.frames + '帧';
  log('已加载到 temp_data_mid: ' + data.frames + '帧');
  await loadFrame(0);
};
async function loadFrame(idx) {
  if (idx < 0 || idx >= state.totalFrames) return;
  state.currentFrame = idx;
  const res = await fetch('/api/get_frame/' + idx);
  const imgData = await res.text();
  const img = document.getElementById('videoImg');
  img.src = 'data:image/jpeg;base64,' + imgData;
  img.onload = () => {
    const canvas = document.getElementById('mainCanvas');
    canvas.width = img.naturalWidth * state.zoom;
    canvas.height = img.naturalHeight * state.zoom;
    img.style.width = canvas.width + 'px';
    img.style.height = canvas.height + 'px';
    drawCanvas();
  };
  document.getElementById('frameDisplay').textContent = (idx + 1) + '/' + state.totalFrames;
}
function drawCanvas() {
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#ff0';
  state.promptBboxes.forEach(b => {
    ctx.strokeRect(b[0] * state.zoom, b[1] * state.zoom, (b[2]-b[0]) * state.zoom, (b[3]-b[1]) * state.zoom);
  });
}
document.getElementById('mainCanvas').onclick = async (e) => {
  if (state.promptBboxes.length === 0) return;
  await fetch('/api/bidirectional_annotate', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      prompt_frame_idx: state.currentFrame,
      prompt_bboxes: state.promptBboxes,
      forward_enabled: document.getElementById('forwardCb').checked,
      backward_enabled: document.getElementById('backwardCb').checked,
      iou: parseFloat(document.getElementById('iouInput').value),
      merge_iou: parseFloat(document.getElementById('mergeIouInput').value)
    })
  }).then(r => r.json()).then(d => {
    if (d.error) { log('错误: ' + d.error); return; }
    log(d.msg + ', FIRST_ID=' + d.FIRST_ID);
    loadFrame(state.currentFrame);
  });
};
document.getElementById('promptBtn').onclick = () => {
  if (state.promptBboxes.length === 0) {
    const canvas = document.getElementById('mainCanvas');
    canvas.onclick = async (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) / state.zoom;
      const y = (e.clientY - rect.top) / state.zoom;
      const w = 100, h = 100;
      state.promptBboxes.push([x - w/2, y - h/2, x + w/2, y + h/2]);
      document.getElementById('promptBboxList').innerHTML = state.promptBboxes.map((b,i) => '<div class="prompt-bbox-item">bbox' + i + ': ' + Math.round(b[0]) + ',' + Math.round(b[1]) + '</div>').join('');
      document.getElementById('runBidirectionalBtn').disabled = false;
      drawCanvas();
      log('已添加prompt bbox，位置: ' + Math.round(x) + ',' + Math.round(y));
      canvas.onclick = null;
    };
    log('请点击画布添加bbox');
  } else {
    state.promptBboxes = [];
    document.getElementById('promptBboxList').innerHTML = '';
    document.getElementById('runBidirectionalBtn').disabled = true;
    drawCanvas();
    log('已清除prompt bboxes');
  }
};
document.getElementById('backwardBtn').onclick = () => loadFrame(state.currentFrame - 1);
document.getElementById('forwardBtn').onclick = () => loadFrame(state.currentFrame + 1);
document.getElementById('backwardFastBtn').onclick = async () => {
  for (let i = state.currentFrame - 1; i >= 0 && i >= state.currentFrame - 30; i--) await loadFrame(i);
};
document.getElementById('forwardFastBtn').onclick = async () => {
  for (let i = state.currentFrame + 1; i < state.totalFrames && i <= state.currentFrame + 30; i++) await loadFrame(i);
};
document.getElementById('zoomSlider').oninput = (e) => {
  state.zoom = e.target.value / 100;
  document.getElementById('zoomLabel').textContent = e.target.value + '%';
  if (document.getElementById('videoImg').src) loadFrame(state.currentFrame);
};
document.getElementById('confSlider').oninput = (e) => {
  state.conf = e.target.value / 100;
  document.getElementById('confLabel').textContent = e.target.value + '%';
};
document.getElementById('decBtn').onclick = () => {
  if (state.nextTrackId > 0) { state.nextTrackId--; document.getElementById('assignDisplay').textContent = state.nextTrackId; }
};
document.getElementById('incBtn').onclick = () => {
  state.nextTrackId++; document.getElementById('assignDisplay').textContent = state.nextTrackId;
};
document.getElementById('clearTraceBtn').onclick = () => {
  state.traceList = []; renderTraceList();
  fetch('/api/save_trace_id_changes', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mappings:[]})});
  log('已清空ID映射');
  loadFrame(state.currentFrame);
};
document.getElementById('modifyTraceBtn').onclick = () => {
  const sel = document.querySelector('.trace-item.selected');
  if (!sel) return;
  const newVal = prompt('修改映射:', sel.textContent);
  if (!newVal) return;
  sel.textContent = 'ID: ' + newVal;
  state.traceList = Array.from(document.querySelectorAll('.trace-item')).map(e => e.textContent);
  fetch('/api/save_trace_id_changes', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mappings:state.traceList})});
  log('已修改映射: ' + newVal);
};
document.getElementById('deleteTraceBtn').onclick = () => {
  const sel = document.querySelector('.trace-item.selected');
  if (!sel) return;
  sel.remove();
  state.traceList = Array.from(document.querySelectorAll('.trace-item')).map(e => e.textContent);
  fetch('/api/save_trace_id_changes', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mappings:state.traceList})});
  log('已删除映射');
};
function renderTraceList() {
  const list = document.getElementById('traceList');
  list.innerHTML = state.traceList.map((t, i) => '<div class="trace-item' + (i === 0 ? ' selected' : '') + '">' + t + '</div>').join('');
  list.querySelectorAll('.trace-item').forEach(el => {
    el.onclick = () => { list.querySelectorAll('.trace-item').forEach(e => e.classList.remove('selected')); el.classList.add('selected'); };
  });
}
for (let i = 0; i < 8; i++) {
  const tid = 1000000 + i;
  const row = document.createElement('div');
  row.className = 'category-row';
  row.innerHTML = '<label>' + tid + ':</label><input type="text" id="cat' + i + '" value="Detect">';
  document.getElementById('categoryList').appendChild(row);
  document.getElementById('cat' + i).onchange = (e) => {
    state.categoryMappings[i] = e.target.value;
  };
}
document.getElementById('exportBtn').onclick = async () => {
  const res = await fetch('/api/export_to_post', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({category_mappings:state.categoryMappings})});
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  log('导出完成: ' + data.msg);
  alert(data.msg);
};
</script>
</body>
</html>
