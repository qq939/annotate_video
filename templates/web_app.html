<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>标注工具 - Web App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; }
.container { display: flex; width: 100%; height: 100vh; }
.left-panel { width: 460px; min-width: 460px; background: #181825; border-right: 1px solid #313244; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.right-panel { flex: 1; display: flex; flex-direction: column; background: #11111b; position: relative; }
.panel-section { background: #1e1e2e; border: 1px solid #313244; border-radius: 6px; padding: 8px; }
.panel-section h3 { font-size: 13px; color: #89b4fa; margin-bottom: 6px; border-bottom: 1px solid #313244; padding-bottom: 4px; }
.panel-section h3 .section-title { color: #89dceb; }
.row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.row label { font-size: 12px; color: #a6adc8; min-width: 52px; }
.row input, .row select { padding: 4px 8px; background: #313244; border: 1px solid #45475a; border-radius: 4px; color: #cdd6f4; font-size: 12px; }
.row input:focus { outline: none; border-color: #89b4fa; }
.row input[type="number"] { width: 52px; }
.btn { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: background 0.2s; white-space: nowrap; }
.btn-primary { background: #89b4fa; color: #1e1e2e; }
.btn-primary:hover { background: #74c7ec; }
.btn-success { background: #a6e3a1; color: #1e1e2e; }
.btn-success:hover { background: #94e2d5; }
.btn-danger { background: #f38ba8; color: #1e1e2e; }
.btn-danger:hover { background: #eba0ac; }
.btn-warning { background: #fab387; color: #1e1e2e; }
.btn-warning:hover { background: #f9e2af; }
.btn-secondary { background: #45475a; color: #cdd6f4; }
.btn-secondary:hover { background: #585b70; }
.btn-orange { background: #ffa500; color: white; }
.btn-orange:hover { background: #ff8c00; }
.btn-sm { padding: 3px 8px; font-size: 11px; }
.btn-lg { padding: 6px 14px; font-size: 13px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.progress-bar { height: 6px; background: #313244; border-radius: 3px; overflow: hidden; margin-top: 4px; display: none; }
.progress-fill { height: 100%; background: #89b4fa; width: 0%; transition: width 0.2s; }
.progress-text { font-size: 11px; color: #a6adc8; text-align: center; margin-top: 2px; display: none; }
.canvas-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 10px; position: relative; }
.canvas-wrapper canvas { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
.nav-bar { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px; background: #181825; border-top: 1px solid #313244; flex-wrap: wrap; }
.nav-bar input[type="text"] { width: 70px; text-align: center; padding: 3px 6px; background: #313244; border: 1px solid #45475a; border-radius: 4px; color: #cdd6f4; font-size: 13px; }
.nav-bar .frame-label { background: #333; color: #fff; border-radius: 3px; padding: 4px 12px; font-weight: bold; font-size: 12px; min-width: 70px; text-align: center; }
.status-msg { font-size: 12px; color: #a6adc8; padding: 4px 8px; background: #313244; border-radius: 4px; display: none; }
.checkbox-row { display: flex; align-items: center; gap: 6px; }
.checkbox-row label { font-size: 12px; color: #a6adc8; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.mapping-list { max-height: 90px; overflow-y: auto; font-size: 11px; margin-top: 4px; border: 1px solid #313244; border-radius: 4px; background: #11111b; }
.mapping-list .item { display: flex; align-items: center; gap: 6px; padding: 3px 8px; border-bottom: 1px solid #313244; }
.mapping-list .item:last-child { border-bottom: none; }
.mapping-list .item span { flex: 1; color: #a6adc8; }
.mapping-list .item .del-btn { color: #f38ba8; cursor: pointer; font-size: 14px; }
.mapping-list .item.selected { background: #45475a; }
.playback-row { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; }
.playback-row .play-btn { min-width: 44px; padding: 4px 8px; font-size: 11px; }
.trace-id-row { display: flex; align-items: center; gap: 4px; margin: 4px 0; }
.trace-id-row .id-btn { width: 28px; height: 28px; border: 1px solid #45475a; border-radius: 4px; background: #313244; color: #cdd6f4; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.trace-id-row .id-btn:hover { background: #45475a; }
.trace-id-row input { width: 80px; text-align: center; padding: 4px 6px; background: #313244; border: 1px solid #45475a; border-radius: 4px; color: #cdd6f4; font-size: 14px; font-weight: bold; }
.trace-id-row input:focus { border-color: #89b4fa; }
.trace-id-row label { font-size: 11px; color: #a6adc8; }
.trace-controls { display: flex; flex-direction: column; gap: 4px; }
.trace-controls .btn-col { display: flex; gap: 4px; }
.slider-row { display: flex; align-items: center; gap: 6px; }
.slider-row label { font-size: 11px; color: #a6adc8; min-width: 42px; }
.slider-row input[type="range"] { flex: 1; min-width: 80px; }
.slider-row .slider-val { font-size: 11px; color: #a6adc8; min-width: 32px; }
.color-palette { display: flex; gap: 4px; margin-top: 4px; }
.color-palette .color-btn { width: 24px; height: 24px; border: 2px solid transparent; border-radius: 4px; cursor: pointer; }
.color-palette .color-btn.selected { border-color: gold; }
.fence-row { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
.fence-row .fence-btn { padding: 3px 8px; font-size: 11px; }
.bind-row { display: flex; gap: 4px; align-items: center; }
.bind-row label { font-size: 11px; color: #a6adc8; min-width: 36px; }
.bind-row input { padding: 2px 6px; background: #313244; border: 1px solid #45475a; border-radius: 4px; color: #cdd6f4; font-size: 11px; width: 70px; }
.bind-row .btn { padding: 2px 8px; font-size: 11px; }
.debug-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e2e; border: 2px solid #89b4fa; border-radius: 8px; padding: 16px; width: 600px; max-height: 80vh; z-index: 2000; box-shadow: 0 0 30px rgba(137, 180, 250, 0.3); display: none; }
.debug-panel.show { display: block; }
.debug-panel h2 { color: #89b4fa; margin: 0 0 12px 0; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
.debug-panel h2 .close-btn { background: #f38ba8; color: #1e1e2e; border: none; border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 12px; }
.debug-content { background: #11111b; border: 1px solid #313244; border-radius: 4px; padding: 12px; max-height: 400px; overflow-y: auto; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.debug-line { color: #cdd6f4; }
.debug-line.time { color: #6c7086; }
.debug-line.info { color: #89b4fa; }
.debug-line.success { color: #a6e3a1; }
.debug-line.warning { color: #fab387; }
.debug-line.error { color: #f38ba8; }
.debug-line.progress { color: #89dceb; }
.debug-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999; display: none; }
.debug-overlay.show { display: block; }
#debugToggleBtn { position: fixed; bottom: 80px; right: 20px; z-index: 1001; }
</style>
</head>
<body>
<div class="container">
  <div class="left-panel">
    <div class="status-msg" id="statusMsg"></div>

    <!-- Section 1: 视频标注 -->
    <div class="panel-section" id="annotateSection">
      <h3><span class="section-title">1.</span> 视频标注 (annotate_video)</h3>
      <div class="row">
        <label>视频:</label>
        <input type="file" id="videoFile" accept="video/*" style="flex:1;min-width:0;">
        <button class="btn btn-secondary btn-sm" id="selectVideoBtn">选择</button>
        <button class="btn btn-primary btn-sm" id="showAnnotateBtn">显示</button>
      </div>
      <div class="row" style="margin-top:4px">
        <label>文件名:</label>
        <span id="videoName" style="font-size:12px;color:#a6adc8;flex:1;overflow:hidden;text-overflow:ellipsis;">未选择</span>
      </div>
      <div class="row" style="margin-top:4px">
        <label>合并IoU:</label>
        <input type="number" id="mergeIouInput" value="0.5" min="0" max="1" step="0.05">
        <label style="min-width:36px;">帧IoU:</label>
        <input type="number" id="iouInput" value="0.5" min="0" max="1" step="0.05">
      </div>
      <div class="row" style="margin-top:4px">
        <label>查找:</label>
        <input type="text" id="itemsInput" placeholder="逗号分隔,如: person,car" style="flex:1;min-width:0;">
        <button class="btn btn-warning btn-sm" id="undoBboxBtn">撤销</button>
        <span id="bboxCount" style="font-size:11px;color:#a6adc8;"></span>
      </div>
      <div class="slider-row" style="margin-top:4px">
        <label>缩放:</label>
        <input type="range" id="scaleSlider" min="50" max="200" value="100">
        <span class="slider-val" id="scaleLabel">100%</span>
      </div>
      <div class="row" style="margin-top:6px">
        <button class="btn btn-primary btn-lg" id="annotateBtn" disabled>▶ 执行标注</button>
      </div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>

    <!-- Section 2: 预览 -->
    <div class="panel-section" id="viewerSection">
      <h3><span class="section-title">2.</span> 预览</h3>
      <div class="row">
        <label>数据:</label>
        <input type="text" id="pathInput" value="temp_data" style="flex:1;min-width:0;">
        <button class="btn btn-secondary btn-sm" id="selectDataBtn">选择</button>
        <button class="btn btn-success btn-sm" id="showViewerBtn">显示</button>
      </div>
      <div class="slider-row" style="margin-top:4px">
        <label>缩放:</label>
        <input type="range" id="zoomSlider" min="50" max="200" value="100">
        <span class="slider-val" id="zoomLabel">100%</span>
      </div>
      <div class="slider-row" style="margin-top:4px">
        <label>置信度:</label>
        <input type="range" id="confSlider" min="0" max="100" value="50">
        <span class="slider-val" id="confLabel">50%</span>
      </div>

      <!-- Playback Controls -->
      <div class="playback-row" style="margin-top:6px;overflow-x:auto;">
        <button class="btn btn-secondary play-btn" id="backwardFastBtn">倒播</button>
        <button class="btn btn-secondary play-btn" id="backwardBtn">倒帧</button>
        <div class="checkbox-row">
          <label><input type="checkbox" id="backwardCb" checked> 后向</label>
        </div>
        <button class="btn btn-orange play-btn" id="promptBtn">提示帧</button>
        <span class="frame-label" id="frameLabel">1/1</span>
        <div class="checkbox-row">
          <label><input type="checkbox" id="forwardCb" checked> 前向</label>
        </div>
        <button class="btn btn-secondary play-btn" id="forwardBtn">正帧</button>
        <button class="btn btn-secondary play-btn" id="forwardFastBtn">正播</button>
      </div>

      <!-- Delete Trace -->
      <div class="row" style="margin-top:6px">
        <label>删除trace:</label>
        <input type="text" id="deleteTraceInput" placeholder="输入ID" style="width:80px;">
        <button class="btn btn-danger btn-sm" id="deleteTraceBtn">删除</button>
      </div>

      <!-- Trace ID Mappings -->
      <div class="trace-controls" style="margin-top:6px;">
        <label style="font-size:12px;color:#a6adc8;">ID映射</label>
        <div class="mapping-list" id="mappingList"></div>
        <div class="btn-col" style="margin-top:4px">
          <button class="btn btn-secondary btn-sm" id="clearMappingBtn">清空</button>
          <button class="btn btn-warning btn-sm" id="clearGreenBtn">清空绿点</button>
          <button class="btn btn-primary btn-sm" id="modifyMappingBtn">变更</button>
          <button class="btn btn-danger btn-sm" id="deleteMappingBtn">删除</button>
          <button class="btn btn-success btn-sm" id="saveMappingBtn">保存</button>
        </div>
      </div>

      <!-- Current ID Assignment -->
      <div class="trace-id-row" style="margin-top:6px">
        <label>当前ID:</label>
        <button class="id-btn" id="decIdBtn">−</button>
        <input type="text" id="currentIdInput" value="1000000">
        <button class="id-btn" id="incIdBtn">+</button>
      </div>

      <!-- Fence Mode -->
      <div class="fence-row">
        <button class="btn btn-secondary fence-btn" id="fenceToggleBtn">围栏模式</button>
        <button class="btn btn-secondary fence-btn" id="fenceClearBtn">清除</button>
        <span id="fenceStatus" style="font-size:11px;color:#a6adc8;"></span>
      </div>

      <!-- Export Button -->
      <div class="row" style="margin-top:6px">
        <button class="btn btn-success" id="exportBtn" disabled>📦 导出到 temp_data_post</button>
      </div>
    </div>

    <!-- Section 3: 导出视频 -->
    <div class="panel-section" id="saveSection">
      <h3><span class="section-title">3.</span> 导出视频 (save)</h3>
      <div class="row">
        <label>目录:</label>
        <input type="text" id="savePathInput" value="temp_data_post" style="flex:1;min-width:0;">
        <button class="btn btn-secondary btn-sm" id="browseSaveBtn">浏览</button>
      </div>
      <div class="row" style="margin-top:4px">
        <label>文件名:</label>
        <input type="text" id="saveNameInput" value="1dst.mp4" style="flex:1;min-width:0;">
      </div>
      <div class="slider-row" style="margin-top:4px">
        <label>透明度:</label>
        <input type="range" id="alphaSlider" min="10" max="100" value="50">
        <span class="slider-val" id="alphaLabel">50%</span>
      </div>
      <div class="row" style="margin-top:4px">
        <label>颜色:</label>
        <div class="color-palette" id="colorPalette"></div>
      </div>
      <div class="row" style="margin-top:6px">
        <button class="btn btn-success btn-lg" id="saveBtn">💾 保存视频并上传OBS</button>
      </div>
      <div id="saveStatus" style="font-size:11px;color:#a6adc8;margin-top:4px;"></div>
    </div>

    <!-- Bidirectional Section -->
    <div class="panel-section" id="bidirectionalSection" style="display:none;">
      <h3><span class="section-title">4.</span> 双向标注</h3>
      <div class="row">
        <label>提示帧:</label>
        <input type="number" id="promptFrameIdx" value="0" min="0" style="width:60px;">
        <button class="btn btn-warning btn-sm" id="promptFrameBtn">执行提示帧</button>
      </div>
      <div class="row" style="margin-top:4px">
        <div class="checkbox-row">
          <label><input type="checkbox" id="backwardCheck" checked> 后向</label>
          <span style="color:#a6adc8;font-size:12px;">← 提示帧 →</span>
          <label><input type="checkbox" id="forwardCheck" checked> 前向</label>
        </div>
      </div>
      <div class="row" style="margin-top:6px">
        <button class="btn btn-primary" id="bidirectionalBtn">▶ 双向标注</button>
      </div>
      <div id="bidirectionalDebug" style="font-size:11px;color:#f9e2af;background:#313244;border-radius:4px;padding:4px 8px;max-height:60px;overflow-y:auto;display:none;margin-top:4px;"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="canvas-wrapper">
      <canvas id="viewerCanvas"></canvas>
    </div>
    <div class="nav-bar">
      <button class="btn btn-secondary btn-sm" id="prevFrameBtn">◀</button>
      <input type="text" id="frameIdxInput" value="0">
      <span id="frameInfo">/ 0</span>
      <button class="btn btn-secondary btn-sm" id="nextFrameBtn">▶</button>
      <span style="margin-left:16px;font-size:12px;color:#a6adc8;">帧:</span>
      <span class="frame-label" id="navFrameLabel">0/0</span>
    </div>
  </div>

<!-- Debug Panel -->
<div class="debug-overlay" id="debugOverlay"></div>
<div class="debug-panel" id="debugPanel">
  <h2>
    <span>🔍 Debug 日志</span>
    <button class="close-btn" onclick="toggleDebug()">关闭</button>
  </h2>
  <div class="debug-content" id="debugContent"></div>
</div>

<!-- Debug Toggle Button -->
<button class="btn btn-secondary" id="debugToggleBtn" onclick="toggleDebug()">🔍 Debug</button>

</div>

<script>
const state = {
  videoName: '',
  totalFrames: 0,
  currentFrame: 0,
  annotations: [],
  traceIdChanges: [],
  currentTraceId: 1000000,
  promptBboxes: [],
  annotationRunning: false,
  isPlaying: false,
  playDirection: 1,
  playSpeed: 1000,
  playbackTimer: null,
  promptMode: false,
  fenceMode: false,
  selectedColorIndex: Math.floor(Math.random() * 7),
  mappingSelectedIdx: -1,
  isDrawing: false,
  drawStartX: 0,
  drawStartY: 0,
  drawCurrentX: 0,
  drawCurrentY: 0,
  greenPoints: [],
  firstFrameData: null,
};

const PALETTE_COLORS = ['#ff0000','#ffa500','#ffff00','#00ff00','#00ffff','#0000ff','#800080'];

const canvas = document.getElementById('viewerCanvas');
const ctx = canvas.getContext('2d');

function $(id) { return document.getElementById(id); }

let debugLogs = [];
function addDebugLog(msg, type) {
  const time = new Date().toLocaleTimeString();
  debugLogs.push({ time, msg, type });
  const content = $('debugContent');
  if (content) {
    const line = document.createElement('div');
    line.className = 'debug-line ' + (type || '');
    line.textContent = '[' + time + '] ' + msg;
    content.appendChild(line);
    content.scrollTop = content.scrollHeight;
  }
}

function toggleDebug() {
  const panel = $('debugPanel');
  const overlay = $('debugOverlay');
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    overlay.classList.remove('show');
  } else {
    panel.classList.add('show');
    overlay.classList.add('show');
  }
}

function clearDebug() {
  debugLogs = [];
  const content = $('debugContent');
  if (content) content.innerHTML = '';
}

function setStatus(msg, isError) {
  const el = $('statusMsg');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = isError ? '#f38ba8' : '#313244';
  el.style.color = isError ? '#1e1e2e' : '#cdd6f4';
  setTimeout(() => el.style.display = 'none', 5000);
}

async function apiPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function apiGet(url) {
  const res = await fetch(url);
  if (!res.ok) {
    const ct = res.headers.get('content-type');
    if (ct && ct.includes('application/json')) {
      const data = await res.json();
      throw new Error(data.error || `HTTP ${res.status}`);
    }
    throw new Error(`HTTP ${res.status}`);
  }
  const data = await res.json();
  return data;
}

async function apiFetch(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) {
    const ct = res.headers.get('content-type');
    if (ct && ct.includes('application/json')) {
      const d = await res.json();
      throw new Error(d.error || `HTTP ${res.status}`);
    }
    throw new Error(`HTTP ${res.status}`);
  }
  return res;
}

// ==================== Video Upload ====================
$('videoFile').addEventListener('change', (e) => {
  if (e.target.files[0]) $('selectVideoBtn').click();
});

$('selectVideoBtn').onclick = async () => {
  const file = $('videoFile').files[0];
  if (!file) { setStatus('请选择视频文件', true); return; }
  const fd = new FormData();
  fd.append('video', file);
  try {
    const res = await apiFetch('/api/upload_video', { method: 'POST', body: fd });
    const data = await res.json();
    state.videoName = data.filename;
    $('videoName').textContent = data.filename;
    state.totalFrames = data.total;
    state.currentFrame = 0;
    $('annotateBtn').disabled = false;
    $('exportBtn').disabled = false;
    $('saveSection').style.display = 'block';
    $('bidirectionalSection').style.display = 'block';
    updateFrameInfo();
    await loadFirstFrameForDraw();
    setStatus('上传成功: ' + data.filename);
  } catch (e) { setStatus('上传失败: ' + e.message, true); }
};

async function loadFirstFrameForDraw() {
  try {
    const res = await fetch('/api/get_video_first_frame');
    const data = await res.json();
    if (!data.image) return;
    canvas.width = data.width || 800;
    canvas.height = data.height || 600;
    const img = new Image();
    img.onload = () => {
      canvas.width = img.naturalWidth || data.width || 800;
      canvas.height = img.naturalHeight || data.height || 600;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      state.firstFrameData = 'data:image/jpeg;base64,' + data.image;
    };
    img.src = 'data:image/jpeg;base64,' + data.image;
  } catch (e) { /* ignore */ }
}

// ==================== Annotate ====================
$('annotateBtn').onclick = async () => {
  if (!state.videoName) { setStatus('请先上传视频', true); return; }
  if (state.annotationRunning) { setStatus('标注正在执行中...', true); return; }
  await runAnnotation($('itemsInput').value);
};

$('scaleSlider').oninput = () => { $('scaleLabel').textContent = $('scaleSlider').value + '%'; };
$('zoomSlider').oninput = () => { $('zoomLabel').textContent = $('zoomSlider').value + '%'; loadFrame(state.currentFrame); };
$('confSlider').oninput = () => { $('confLabel').textContent = $('confSlider').value + '%'; loadFrame(state.currentFrame); };
$('alphaSlider').oninput = () => { $('alphaLabel').textContent = $('alphaSlider').value + '%'; };

async function runAnnotation(items) {
  state.annotationRunning = true;
  $('annotateBtn').disabled = true;
  $('progressBar').style.display = 'block';
  $('progressText').style.display = 'block';
  $('progressFill').style.width = '0%';
  $('progressText').textContent = '正在初始化...';
  clearDebug();
  toggleDebug();
  addDebugLog('开始标注任务...', 'info');
  addDebugLog('视频: ' + state.videoName, 'info');
  addDebugLog('IoU: ' + $('iouInput').value + ', 合并IoU: ' + $('mergeIouInput').value, 'info');
  addDebugLog('查找: ' + (items || '全部'), 'info');
  addDebugLog('边界框数量: ' + state.promptBboxes.length, 'info');

  const params = {
    video_name: state.videoName,
    iou: parseFloat($('iouInput').value),
    merge_iou: parseFloat($('mergeIouInput').value),
    items: items,
    bboxes: state.promptBboxes,
  };

  try {
    const response = await fetch('/api/run_annotate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params)
    });
    if (!response.ok) {
      const ed = await response.json().catch(() => ({}));
      throw new Error(ed.error || `HTTP ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data:')) {
          try {
            const d = JSON.parse(line.slice(5));
            if (d.type === 'progress' || d.percent !== undefined) {
              const pct = d.percent !== undefined ? d.percent : (d.progress || 0);
              $('progressFill').style.width = pct + '%';
              const frame = d.frame !== undefined ? `帧 ${d.frame}/${d.total} ` : '';
              const msg = d.msg || frame + pct + '%';
              $('progressText').textContent = msg;
              addDebugLog(msg, 'progress');
            }
            if (d.type === 'error' || d.error) {
              addDebugLog('错误: ' + (d.msg || d.error), 'error');
            }
          } catch (e) { /* ignore parse errors */ }
        }
      }
    }

    addDebugLog('标注完成！', 'success');
    setStatus('标注完成');
    state.promptBboxes = [];
    await showViewer(true);
  } catch (e) {
    addDebugLog('标注失败: ' + e.message, 'error');
    setStatus('标注失败: ' + e.message, true);
  } finally {
    state.annotationRunning = false;
    $('annotateBtn').disabled = false;
    $('progressBar').style.display = 'none';
    $('progressText').style.display = 'none';
  }
}

$('undoBboxBtn').onclick = () => undoLastBbox();

let isDragging = false;
let dragStarted = false;

canvas.addEventListener('mousedown', (e) => {
  if (state.annotationRunning || canvas.width === 0) return;
  isDragging = true;
  dragStarted = false;
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  state.drawStartX = (e.clientX - r.left) * scaleX;
  state.drawStartY = (e.clientY - r.top) * scaleY;
  state.drawCurrentX = state.drawStartX;
  state.drawCurrentY = state.drawStartY;
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging || canvas.width === 0) return;
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  state.drawCurrentX = (e.clientX - r.left) * scaleX;
  state.drawCurrentY = (e.clientY - r.top) * scaleY;
  const dx = state.drawCurrentX - state.drawStartX;
  const dy = state.drawCurrentY - state.drawStartY;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
    dragStarted = true;
    state.isDrawing = true;
    requestAnimationFrame(redrawBbox);
  }
});

canvas.addEventListener('mouseup', (e) => {
  isDragging = false;
  if (!dragStarted) {
    state.isDrawing = false;
    return;
  }
  dragStarted = false;
  state.isDrawing = false;
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  const endX = (e.clientX - r.left) * scaleX;
  const endY = (e.clientY - r.top) * scaleY;
  const x1 = Math.min(state.drawStartX, endX);
  const y1 = Math.min(state.drawStartY, endY);
  const x2 = Math.max(state.drawStartX, endX);
  const y2 = Math.max(state.drawStartY, endY);
  if (x2 - x1 > 10 && y2 - y1 > 10) {
    state.promptBboxes.push([x1, y1, x2, y2]);
    updateBboxCount();
    setStatus('已添加边界框 (' + state.promptBboxes.length + ')', false);
  }
  redrawBbox();
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  dragStarted = false;
  state.isDrawing = false;
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  undoLastBbox();
});

function undoLastBbox() {
  if (state.promptBboxes.length > 0) {
    state.promptBboxes.pop();
    updateBboxCount();
    redrawBbox();
    setStatus('已撤销最后一个边界框', false);
  }
}

function updateBboxCount() {
  const el = $('bboxCount');
  if (el) el.textContent = '已画 ' + state.promptBboxes.length + ' 个框';
}

function redrawBbox() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (state.firstFrameData) {
    const bgImg = new Image();
    bgImg.src = state.firstFrameData;
    bgImg.onload = () => {
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
      drawBboxOverlay();
    };
  } else {
    drawBboxOverlay();
  }
}

function drawBboxOverlay() {
  if (state.isDrawing && state.drawStartX) {
    ctx.strokeStyle = '#a6e3a1';
    ctx.lineWidth = 2;
    ctx.strokeRect(
      state.drawStartX, state.drawStartY,
      state.drawCurrentX - state.drawStartX, state.drawCurrentY - state.drawStartY
    );
  }
  ctx.strokeStyle = '#f9e2af';
  ctx.lineWidth = 2;
  for (const bx of state.promptBboxes) {
    ctx.strokeRect(bx[0], bx[1], bx[2] - bx[0], bx[3] - bx[1]);
  }
}

function togglePlayback(dir, speed) {
  if (state.playbackTimer && state.playDirection === dir && state.playSpeed === speed) {
    stopPlayback();
    return;
  }
  stopPlayback();
  state.playDirection = dir;
  state.playSpeed = speed || 1000;
  state.isPlaying = true;
  state.playbackTimer = setInterval(() => {
    if (state.playDirection === -1) {
      loadFrame(state.currentFrame - 1);
    } else {
      loadFrame(state.currentFrame + 1);
    }
  }, state.playSpeed);
}

function stopPlayback() {
  if (state.playbackTimer) {
    clearInterval(state.playbackTimer);
    state.playbackTimer = null;
  }
  state.isPlaying = false;
}

function togglePlay() {
  if (state.isPlaying) {
    stopPlayback();
  } else {
    togglePlayback(1, 1000);
  }
}

// ==================== Canvas Click / Trace ID ====================
canvas.addEventListener('click', async (e) => {
  addDebugLog('canvas click triggered', 'info');
  if (state.isDrawing) { addDebugLog('跳过: 正在绘制bbox', 'warning'); return; }
  if (canvas.width === 0) { addDebugLog('跳过: canvas未初始化', 'warning'); return; }
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  const cx = (e.clientX - r.left) * scaleX;
  const cy = (e.clientY - r.top) * scaleY;
  addDebugLog('点击位置: (' + Math.round(cx) + ',' + Math.round(cy) + ') 帧' + (state.currentFrame+1) + ' promptMode=' + state.promptMode, 'info');

  if (state.promptMode) {
    state.promptMode = false;
    $('promptBtn').style.background = '#ffa500';
    $('promptBtn').textContent = '提示帧';
    try {
      const data = await apiPost('/api/prompt_frame', {
        prompt_frame_idx: state.currentFrame,
        bboxes: [[cx - 50, cy - 50, cx + 50, cy + 50]],
        items: $('itemsInput').value,
        iou: parseFloat($('iouInput').value),
        merge_iou: parseFloat($('mergeIouInput').value),
      });
      setStatus('提示帧完成: ' + (data.msg || ''));
      await loadFrame(state.currentFrame);
    } catch (e) { setStatus('提示帧失败: ' + e.message, true); }
    return;
  }

  try {
    const af = await apiGet('/api/frame_annotations/' + state.currentFrame);
    addDebugLog('frame_annotations返回: ' + JSON.stringify(af).substring(0, 200), 'info');
    const annotations = af.annotations || [];
    let foundAnn = null;
    for (const ann of annotations) {
      const seg = ann.segmentation;
      if (seg && seg[0]) {
        const pts = [];
        for (let i = 0; i < seg[0].length; i += 2) {
          pts.push([seg[0][i], seg[0][i + 1]]);
        }
        if (isPointInPolygon(cx, cy, pts)) {
          foundAnn = ann;
          break;
        }
      }
    }
    if (foundAnn) {
      addDebugLog('找到标注: track_id=' + foundAnn.track_id + ' currentTraceId=' + state.currentTraceId, 'info');
      const oldId = foundAnn.track_id || 0;
      const newId = state.currentTraceId;
      state.greenPoints.push({
        x: cx, y: cy, frameIdx: state.currentFrame, oldTrackId: oldId, assignedId: newId
      });
      addDebugLog('打绿点: oldId=' + oldId + ' newId=' + newId, 'info');
      $('currentIdInput').value = oldId;
      state.currentTraceId = oldId;
      state.traceIdChanges.push(oldId + '→' + newId);
      addDebugLog('traceIdChanges: ' + JSON.stringify(state.traceIdChanges), 'info');
      renderMappings();
      renderGreenPoints();
      addDebugLog('打绿点成功: 帧' + (state.currentFrame+1) + ' 位置(' + Math.round(cx) + ',' + Math.round(cy) + ') 原ID=' + oldId + '→' + newId, 'success');
      const saveResult = await apiPost('/api/save_mappings', { mappings: state.traceIdChanges });
      addDebugLog('保存结果: ' + JSON.stringify(saveResult), 'success');
      await showViewer(true);
      addDebugLog('刷新视图完成', 'info');
    } else {
      addDebugLog('未找到标注: 帧' + (state.currentFrame+1) + ' 位置(' + Math.round(cx) + ',' + Math.round(cy) + ')', 'warning');
    }
  } catch (e) { addDebugLog('点击失败: ' + e.message, 'error'); }
});

function isPointInPolygon(px, py, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i][0], yi = polygon[i][1];
    const xj = polygon[j][0], yj = polygon[j][1];
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

function renderMappings() {
  const el = $('mappingList');
  if (!el) return;
  el.innerHTML = state.traceIdChanges.map((m, i) =>
    `<div class="item${i === state.mappingSelectedIdx ? ' selected' : ''}" data-idx="${i}" style="cursor:pointer;">
      <span>${m}</span>
      <span class="del-btn" data-idx="${i}">✕</span>
    </div>`
  ).join('');
  if (state.traceIdChanges.length === 0) {
    el.innerHTML = '<div style="padding:8px;font-size:11px;color:#585b70;text-align:center;">暂无映射</div>';
  }
  el.querySelectorAll('.del-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      state.traceIdChanges.splice(idx, 1);
      state.mappingSelectedIdx = -1;
      renderMappings();
    };
  });
  el.querySelectorAll('.item').forEach(item => {
    item.onclick = () => {
      state.mappingSelectedIdx = parseInt(item.dataset.idx);
      renderMappings();
    };
  });
}

function renderGreenPoints() {
  for (const pt of state.greenPoints) {
    if (pt.frameIdx === state.currentFrame) {
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#00ff00';
      ctx.fill();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

  const saveDir = $('savePathInput').value.trim();
  const outputName = $('saveNameInput').value.trim() || '1dst.mp4';
  const alpha = parseInt($('alphaSlider').value) / 100;
  try {
    $('saveBtn').disabled = true;
    $('saveStatus').textContent = '正在保存...';
    const data = await apiPost('/api/save_video', {
      save_dir: saveDir,
      output_name: outputName,
      alpha: alpha,
      selected_color_index: state.selectedColorIndex,
    });
    $('saveStatus').textContent = '保存完成: ' + (data.msg || '') + (data.upload ? ' 上传成功' : '');
    setStatus('视频保存' + (data.upload ? '并上传' : '') + '完成');
  } catch (e) {
    $('saveStatus').textContent = '保存失败: ' + e.message;
    setStatus('保存失败: ' + e.message, true);
  } finally {
    $('saveBtn').disabled = false;
  }
};

// ==================== Fence Mode ====================
$('fenceToggleBtn').onclick = () => {
  state.fenceMode = !state.fenceMode;
  $('fenceToggleBtn').style.background = state.fenceMode ? '#ffa500' : '#45475a';
  $('fenceStatus').textContent = state.fenceMode ? '围栏模式: ON' : '';
  apiPost('/api/fence/toggle', {}).catch(() => {});
};

$('fenceClearBtn').onclick = () => {
  apiPost('/api/fence/clear', {}).catch(() => {});
  setStatus('围栏已清除');
};

// ==================== Init ====================
initColorPalette();
</script>
</body>
</html>
