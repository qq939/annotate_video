<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web标注工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #ddd;
  font-family: Arial, sans-serif;
  min-height: 100vh;
}
.tab-bar {
  display: flex;
  background: #111;
  border-bottom: 1px solid #333;
}
.tab-btn {
  padding: 12px 28px;
  cursor: pointer;
  background: #111;
  color: #888;
  border: none;
  border-bottom: 2px solid transparent;
  font-size: 15px;
  font-weight: bold;
  transition: all 0.2s;
}
.tab-btn:hover { color: #fff; }
.tab-btn.active {
  color: #00CC00;
  border-bottom-color: #00CC00;
  background: #1a1a2e;
}
.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

.panel {
  background: #16213e;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
  max-width: 900px;
}
.panel-title {
  font-size: 14px;
  font-weight: bold;
  color: #aaa;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid #333;
}
.row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
label { font-size: 13px; color: #aaa; white-space: nowrap; }
input[type=text], input[type=file] {
  background: #0f3460;
  border: 1px solid #444;
  color: #fff;
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 13px;
  outline: none;
}
input[type=text]:focus { border-color: #00CC00; }
input[type=file] { background: #0f3460; }
.btn {
  padding: 7px 16px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  transition: all 0.2s;
}
.btn-primary { background: #00CC00; color: white; }
.btn-primary:hover { background: #009900; }
.btn-primary:disabled { background: #555; color: #888; cursor: not-allowed; }
.btn-secondary { background: #555; color: #fff; }
.btn-secondary:hover { background: #666; }
.btn-danger { background: #e74c3c; color: white; }
.btn-danger:hover { background: #c0392b; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.file-drop {
  border: 2px dashed #444;
  border-radius: 8px;
  padding: 24px;
  text-align: center;
  color: #888;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.file-drop:hover, .file-drop.dragover {
  border-color: #00CC00;
  background: rgba(0,204,0,0.05);
}

.canvas-wrap {
  position: relative;
  display: inline-block;
  margin: 8px 0;
  border: 1px solid #333;
  border-radius: 4px;
  overflow: hidden;
  max-width: 100%;
}
.canvas-wrap img { display: block; max-width: 100%; }
#videoCanvas, #imageCanvas {
  position: absolute;
  top: 0; left: 0;
  cursor: crosshair;
  border: 1px solid #666;
  background: rgba(0,0,0,0.15);
  z-index: 1;
}
.canvas-wrap img { position: relative; z-index: 0; }
#videoCanvasTab, #imageCanvasTab {
  display: none;
  font-size: 12px;
  color: #888;
  margin: 6px 0;
}

.color-palette {
  display: flex;
  gap: 4px;
  align-items: center;
}
.color-btn {
  width: 28px;
  height: 22px;
  border: 2px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  opacity: 0.7;
}
.color-btn:hover { opacity: 1; }
.color-btn.selected { opacity: 1; border-color: white; }

.color-name {
  display: inline-block;
  width: 18px; height: 18px;
  border-radius: 3px;
  border: 1px solid #555;
}

#videoStatus, #imageStatus {
  margin-top: 10px;
  padding: 10px;
  border-radius: 4px;
  font-size: 13px;
  display: none;
}
#videoStatus.error, #imageStatus.error { background: rgba(231,76,60,0.2); border: 1px solid #e74c3c; color: #e74c3c; }
#videoStatus.success, #imageStatus.success { background: rgba(0,204,0,0.15); border: 1px solid #00CC00; color: #00CC00; }
#videoStatus.info, #imageStatus.info { background: rgba(52,152,219,0.2); border: 1px solid #3498db; color: #3498db; }

.box-list {
  margin-top: 8px;
  max-height: 120px;
  overflow-y: auto;
}
.box-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 6px;
  background: #0f3460;
  border-radius: 3px;
  margin-bottom: 3px;
  font-size: 12px;
}
.box-item .color-swatch {
  width: 14px; height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: #333;
  border-radius: 3px;
  margin-top: 8px;
  overflow: hidden;
  display: none;
}
.progress-fill {
  height: 100%;
  background: #00CC00;
  width: 0%;
  transition: width 0.3s;
  border-radius: 3px;
}

.result-img {
  max-width: 100%;
  border-radius: 4px;
  margin-top: 10px;
  border: 1px solid #333;
}
a { color: #3498db; }
.info-text { font-size: 11px; color: #777; margin-top: 4px; }
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('video')">视频标注</button>
  <button class="tab-btn" onclick="switchTab('image')">图片标注</button>
  <button class="tab-btn" onclick="switchTab('viewer')">视频预览</button>
  <button class="tab-btn" onclick="switchTab('save')">视频保存</button>
</div>



<!-- ==================== 视频标注 ==================== -->
<div id="tab-video" class="tab-content active">
  <div class="panel">
    <div class="panel-title">1. 视频文件</div>
    <div class="file-drop" id="videoDrop" onclick="document.getElementById('videoFileInput').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleVideoDrop(event)">
      <div>拖入视频文件 或 点击选择</div>
      <div style="font-size:11px;color:#666;margin-top:4px">支持 mp4, avi, mov, mkv</div>
    </div>
    <input type="file" id="videoFileInput" accept="video/*" style="display:none" onchange="handleVideoFile(this)">
    <div id="videoFileName" style="margin-top:6px;font-size:12px;color:#888;"></div>
  </div>

  <div class="panel" id="videoDrawPanel" style="display:none">
    <div class="panel-title">2. 框选目标（首帧）</div>
    <div id="videoCanvasTab">提示: 在图片上拖动画框 | C:撤销 | 最多20个</div>
    <div class="canvas-wrap" id="videoCanvasWrap">
      <img id="videoThumbImg" crossorigin="anonymous">
      <canvas id="videoCanvas"></canvas>
    </div>
    <div class="box-list" id="videoBoxList"></div>
  </div>

  <div class="panel" id="videoParamsPanel" style="display:none">
    <div class="panel-title">3. 参数设置</div>
    <div class="row">
      <label>帧IoU:</label>
      <input type="text" id="videoMergeIou" value="0.5" style="width:60px">
      <label style="margin-left:12px">前后IoU:</label>
      <input type="text" id="videoIou" value="0.5" style="width:60px">
      <label style="margin-left:12px">物品(逗号分隔):</label>
      <input type="text" id="videoItems" placeholder="如: nozzle, needle" style="width:200px">
    </div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-primary" id="videoRunBtn" onclick="runVideoAnnotate()">▶ 执行标注</button>
      <button class="btn btn-danger btn-sm" onclick="clearVideoBoxes()">清空框</button>
    </div>
    <div class="progress-bar" id="videoProgressBar">
      <div class="progress-fill" id="videoProgressFill"></div>
    </div>
    <div id="videoStatus"></div>
    <div id="videoResultArea" style="display:none;margin-top:12px">
      <div style="font-size:13px;color:#00CC00;margin-bottom:6px">✓ 标注完成</div>
      <a id="videoResultLink" href="#" target="_blank">下载标注视频</a>
    </div>
  </div>
</div>

<!-- ==================== 图片标注 ==================== -->
<div id="tab-image" class="tab-content">
  <div class="panel">
    <div class="panel-title">1. 图片文件</div>
    <div class="file-drop" id="imageDrop" onclick="document.getElementById('imageFileInput').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleImageDrop(event)">
      <div>拖入图片文件 或 点击选择</div>
      <div style="font-size:11px;color:#666;margin-top:4px">支持 jpg, png, webp, bmp, heic</div>
    </div>
    <input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handleImageFile(this)">
    <div id="imageFileName" style="margin-top:6px;font-size:12px;color:#888;"></div>
  </div>

<!-- ==================== 视频预览 ==================== -->
<div id="tab-viewer" class="tab-content">
  <div class="panel">
    <div class="panel-title">预览设置</div>
    <div class="row">
      <label>数据目录:</label>
      <input type="text" id="viewDirInput" value="temp_data" style="width:150px">
      <button class="btn btn-secondary btn-sm" onclick="openViewer(document.getElementById('viewDirInput').value)">打开</button>
    </div>
    <div class="row">
      <label>置信度:</label>
      <input type="range" id="viewConf" min="0" max="100" value="0" style="width:120px" oninput="viewConf=this.value/100;document.getElementById('viewConfVal').textContent=this.value;loadViewFrame(viewFrameIdx)">
      <span id="viewConfVal" style="min-width:30px">0</span>
      <label style="margin-left:12px">缩放:</label>
      <input type="range" id="viewZoom" min="50" max="200" value="100" style="width:100px" oninput="viewZoom=this.value/100;document.getElementById('viewZoomVal').textContent=this.value+'%';loadViewFrame(viewFrameIdx)">
      <span id="viewZoomVal" style="min-width:40px">100%</span>
    </div>
    <div class="row">
      <label>前后IoU:</label>
      <input type="text" id="viewIou" value="0.5" style="width:50px">
      <label style="margin-left:8px">帧IoU:</label>
      <input type="text" id="viewMergeIou" value="0.5" style="width:50px">
      <label style="margin-left:8px">物品:</label>
      <input type="text" id="viewItems" placeholder="逗号分隔" style="width:150px">
      <button class="btn btn-secondary btn-sm" id="viewPromptBtn" onclick="viewTogglePrompt()">提示帧</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">帧导航 &amp; 标注</div>
    <div class="row">
      <button class="btn btn-secondary btn-sm" onclick="viewPrev()">◀上一帧</button>
      <button class="btn btn-secondary btn-sm" id="viewPlayBtn" onclick="toggleViewPlay()">▶播放</button>
      <button class="btn btn-secondary btn-sm" onclick="viewNext()">下一帧▶</button>
      <span id="viewFrameInfo" style="min-width:80px;text-align:center;background:#222;color:#0f0;padding:2px 8px;border-radius:3px;font-size:12px">0/0</span>
      <span id="viewAnnCount" style="font-size:12px;color:#888;margin-left:8px"></span>
    </div>
    <div class="canvas-wrap" id="viewCanvasWrap" style="overflow:auto;max-height:500px;position:relative">
      <img id="viewImg" crossorigin="anonymous" style="display:block;width:100%">
      <canvas id="viewCanvas" style="position:absolute;top:0;left:0;border:1px solid #666;background:rgba(0,0,0,0.1);z-index:1;cursor:crosshair;width:100%;height:100%"></canvas>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">trace_id 管理</div>
    <div class="row">
      <label>下一trace_id:</label>
      <input type="number" id="viewNextTid" value="1000000" style="width:90px">
      <button class="btn btn-secondary btn-sm" onclick="viewSetNextTid()">设置</button>
    </div>
    <div class="row">
      <label>删除trace:</label>
      <input type="number" id="viewDeleteInput" placeholder="trace_id" style="width:90px">
      <button class="btn btn-danger btn-sm" onclick="viewDeleteTrace()">删除</button>
    </div>
    <div class="row">
      <label>类别(逗号分隔):</label>
      <input type="text" id="viewCategories" placeholder="逗号分隔" style="width:300px">
    </div>
    <div class="row" style="margin-top:8px">
      <button class="btn btn-primary btn-sm" onclick="viewPostprocess()">按置信度过滤</button>
    </div>
  </div>
</div>

<!-- ==================== 视频保存 ==================== -->
<div id="tab-save" class="tab-content">
  <div class="panel">
    <div class="panel-title">1. 导出到 temp_data_post</div>
    <div class="row">
      <label>源目录:</label>
      <input type="text" id="saveSrcDir" value="temp_data" style="width:150px">
      <button class="btn btn-primary btn-sm" onclick="doVideoExport()">导出到 temp_data_post</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">2. 保存视频</div>
    <div class="row">
      <label>输入:</label>
      <input type="text" id="saveInputDir" value="temp_data_post" style="width:150px">
      <label style="margin-left:8px">输出名称:</label>
      <input type="text" id="saveOutputName" value="output.mp4" style="width:150px">
    </div>
    <div class="row">
      <label>透明度:</label>
      <input type="range" id="saveAlpha" min="10" max="100" value="30" style="width:120px">
      <span id="saveAlphaVal">30</span><span>%</span>
      <label style="margin-left:12px">置信度:</label>
      <input type="range" id="saveConf" min="0" max="100" value="0" style="width:100px">
      <span id="saveConfVal">0</span><span>%</span>
    </div>
    <div class="row">
      <label>类别:</label>
      <input type="text" id="saveCategories" placeholder="逗号分隔" style="width:300px">
    </div>
    <div class="row" style="margin-top:8px">
      <button class="btn btn-primary" onclick="doVideoSave()">💾 保存视频</button>
      <a id="saveResult" href="#" style="display:none;margin-left:16px">下载视频</a>
    </div>
  </div>
</div>


  <div class="panel" id="imageDrawPanel" style="display:none">
    <div class="panel-title">2. 框选目标 & 颜色</div>
    <div class="row">
      <label>颜色:</label>
      <div class="color-palette" id="colorPalette"></div>
    </div>
    <div id="imageCanvasTab">提示: 在图片上拖动画框 | C:撤销</div>
    <div class="canvas-wrap" id="imageCanvasWrap">
      <img id="imageThumbImg" crossorigin="anonymous">
      <canvas id="imageCanvas"></canvas>
    </div>
    <div class="box-list" id="imageBoxList"></div>
  </div>

  <div class="panel" id="imageParamsPanel" style="display:none">
    <div class="panel-title">3. 参数设置</div>
    <div class="row">
      <label>文本提示词(逗号分隔):</label>
      <input type="text" id="imageItems" placeholder="如: nozzle, needle" style="width:220px">
    </div>
    <div class="row">
      <label>前后IoU:</label>
      <input type="text" id="imageIou" value="0.5" style="width:60px">
      <label style="margin-left:12px">帧IoU:</label>
      <input type="text" id="imageMergeIou" value="0.5" style="width:60px">
      <label style="margin-left:12px"></label>
      <label><input type="checkbox" id="imageSemantic" style="margin-right:4px">使用语义推理模型</label>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-primary" id="imageRunBtn" onclick="runImageAnnotate()">▶ 执行标注</button>
      <button class="btn btn-danger btn-sm" onclick="clearImageBoxes()">清空框</button>
    </div>
    <div class="progress-bar" id="imageProgressBar">
      <div class="progress-fill" id="imageProgressFill"></div>
    </div>
    <div id="imageStatus"></div>
    <div id="imageResultArea" style="display:none;margin-top:12px">
      <div style="font-size:13px;color:#00CC00;margin-bottom:6px">✓ 标注完成</div>
      <img id="imageResultImg" class="result-img">
    </div>
  </div>
</div>

<script>
const BOX_COLORS_HEX = ['#0000FF','#FFA500','#FFFF00','#00FF00','#00FFFF','#FF0000','#FF0080'];
const BOX_COLORS_RGB = [[0,0,255],[0,165,255],[0,255,255],[0,255,0],[255,255,0],[255,0,0],[255,0,128]];

let selectedColorIdx = 0;
let videoBoxes = [];
let imageBoxes = [];
let videoImgNatural = {w:0, h:0};
let imageImgNatural = {w:0, h:0};

// ===================== 标签切换 =====================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'viewer' && viewTotalFrames === 0) {
    document.getElementById('viewDirInput').value = 'temp_data';
    openViewer('temp_data');
  }
  if (tab === 'save') {
    document.getElementById('saveSrcDir').value = 'temp_data';
    document.getElementById('saveInputDir').value = 'temp_data_post';
  }
}

// ===================== 颜色面板 =====================
function initColorPalette() {
  const pal = document.getElementById('colorPalette');
  pal.innerHTML = '';
  const names = ['红','橙','黄','绿','青','蓝','紫'];
  names.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (i === selectedColorIdx ? ' selected' : '');
    btn.style.background = BOX_COLORS_HEX[i];
    btn.title = name;
    btn.onclick = () => selectColor(i);
    pal.appendChild(btn);
  });
  // 随机初始颜色
  selectColor(Math.floor(Math.random() * 7));
}

function selectColor(idx) {
  selectedColorIdx = idx;
  document.querySelectorAll('.color-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
}

// ===================== 视频文件 =====================
function handleVideoDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) uploadVideoFile(f);
}

function handleVideoFile(inp) {
  const f = inp.files[0];
  if (f) uploadVideoFile(f);
}

async function uploadVideoFile(file) {
  showStatus('video', '正在上传...', 'info');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/api/upload_video', {method:'POST', body:fd});
    const d = await r.json();
    if (d.error) { showStatus('video', d.error, 'error'); return; }
    document.getElementById('videoFileName').textContent = d.filename;
    loadVideoThumb(d.thumb, d.width, d.height);
    document.getElementById('videoDrawPanel').style.display = 'block';
    document.getElementById('videoParamsPanel').style.display = 'block';
    document.getElementById('videoResultArea').style.display = 'none';
    videoBoxes = [];
    renderVideoBoxes();
    showStatus('video', '首帧已加载，请在图片上框选目标', 'info');
  } catch(e) { showStatus('video', '上传失败: '+e, 'error'); }
}

function loadVideoThumb(dataUrl, natW, natH) {
  const img = document.getElementById('videoThumbImg');
  img.onload = () => {
    videoImgNatural = {w: natW, h: natH};
    const wrap = document.getElementById('videoCanvasWrap');
    const panelW = Math.max(wrap.parentElement.offsetWidth || 600, 100);
    const displayW = Math.min(panelW - 20, natW);
    const displayH = Math.round(natH * (displayW / natW));
    img.style.width = displayW + 'px';
    img.style.height = displayH + 'px';
    const canvas = document.getElementById('videoCanvas');
    canvas.width = displayW;
    canvas.height = displayH;
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    canvas.style.display = 'block';
    canvas.style.background = 'rgba(0,0,0,0.2)';
    setupVideoCanvas();
  };
  img.src = 'data:image/jpeg;base64,' + dataUrl;
}

// ===================== 视频画框 =====================
function setupVideoCanvas() {
  const canvas = document.getElementById('videoCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false, sx = 0, sy = 0;

  canvas.onmousedown = e => {
    if (videoBoxes.length >= 20) return;
    const r = canvas.getBoundingClientRect();
    sx = e.clientX - r.left;
    sy = e.clientY - r.top;
    drawing = true;
  };
  canvas.onmousemove = e => {
    if (!drawing) return;
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawVideoBoxes(ctx);
    ctx.strokeStyle = BOX_COLORS_HEX[selectedColorIdx];
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, mx - sx, my - sy);
  };
  canvas.onmouseup = e => {
    if (!drawing) return;
    drawing = false;
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const x1 = Math.min(sx, mx), y1 = Math.min(sy, my);
    const x2 = Math.max(sx, mx), y2 = Math.max(sy, my);
    if (x2 - x1 > 5 && y2 - y1 > 5) {
      const dispW = r.width, dispH = r.height;
      const natW = videoImgNatural.w, natH = videoImgNatural.h;
      videoBoxes.push({
        x1: Math.round(x1 * natW / dispW),
        y1: Math.round(y1 * natH / dispH),
        x2: Math.round(x2 * natW / dispW),
        y2: Math.round(y2 * natH / dispH),
        colorIdx: selectedColorIdx
      });
      renderVideoBoxes();
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawVideoBoxes(ctx);
  };
  canvas.onmouseleave = () => {
    if (drawing) { drawing = false; ctx.clearRect(0,0,canvas.width,canvas.height); drawVideoBoxes(ctx); }
  };

  document.addEventListener('keydown', e => {
    if (document.getElementById('tab-video').classList.contains('active') && (e.key === 'c' || e.key === 'C')) {
      videoBoxes.pop();
      renderVideoBoxes();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawVideoBoxes(ctx);
    }
  });
}

function drawVideoBoxes(ctx) {
  const canvas = ctx.canvas;
  const dispW = canvas.width, dispH = canvas.height;
  const natW = videoImgNatural.w, natH = videoImgNatural.h;
  videoBoxes.forEach(b => {
    ctx.strokeStyle = BOX_COLORS_HEX[b.colorIdx];
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x1 * dispW / natW, b.y1 * dispH / natH, (b.x2 - b.x1) * dispW / natW, (b.y2 - b.y1) * dispH / natH);
  });
}

function renderVideoBoxes() {
  const list = document.getElementById('videoBoxList');
  list.innerHTML = videoBoxes.map((b, i) => {
    const c = BOX_COLORS_HEX[b.colorIdx];
    return `<div class="box-item">
      <div class="color-swatch" style="background:${c}"></div>
      <span>目标${i+1}: [${b.x1},${b.y1},${b.x2},${b.y2}]</span>
    </div>`;
  }).join('');
}

function clearVideoBoxes() {
  videoBoxes = [];
  renderVideoBoxes();
  const canvas = document.getElementById('videoCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

// ===================== 视频执行 =====================
let _videoAbortCtrl = null;

async function runVideoAnnotate() {
  const videoName = document.getElementById('videoFileName').textContent.trim();
  if (!videoName) { showStatus('video', '请先上传视频', 'error'); return; }
  if (!videoBoxes.length && !document.getElementById('videoItems').value.trim()) {
    showStatus('video', '请至少框选目标或填写物品名称', 'error'); return; }
  const btn = document.getElementById('videoRunBtn');
  btn.disabled = true;
  document.getElementById('videoProgressBar').style.display = 'block';
  document.getElementById('videoProgressFill').style.width = '0%';
  showStatus('video', '正在处理，请稍候...', 'info');

  if (_videoAbortCtrl) { _videoAbortCtrl.abort(); _videoAbortCtrl = null; }
  _videoAbortCtrl = new AbortController();

  const boxes = videoBoxes.map(b => [b.x1, b.y1, b.x2, b.y2]);
  const body = JSON.stringify({
    video_name: videoName,
    boxes: boxes,
    items: document.getElementById('videoItems').value,
    iou: document.getElementById('videoIou').value,
    merge_iou: document.getElementById('videoMergeIou').value
  });

  try {
    const resp = await fetch('/api/run_video_annotate_stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: body,
      signal: _videoAbortCtrl.signal
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'progress') {
            document.getElementById('videoProgressFill').style.width = data.percent + '%';
            showStatus('video', `处理中: ${data.frame}/${data.total} 帧 (${data.percent}%)`, 'info');
          } else if (data.type === 'done') {
            document.getElementById('videoProgressFill').style.width = '100%';
            showStatus('video', `✓ 完成，共 ${data.frames} 帧`, 'success');
            document.getElementById('videoResultLink').href = data.output;
            document.getElementById('videoResultLink').textContent = '下载: ' + data.output.split('/').pop();
            document.getElementById('videoResultArea').style.display = 'block';
          } else if (data.type === 'error') {
            showStatus('video', '执行失败: ' + data.msg, 'error');
          }
        } catch(e) { /* ignore parse error */ }
      }
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      showStatus('video', '执行失败: ' + e.message, 'error');
    }
  } finally {
    btn.disabled = false;
    _videoAbortCtrl = null;
  }
}

// ===================== 图片文件 =====================
function handleImageDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) uploadImageFile(f);
}

function handleImageFile(inp) {

}

async function uploadImageFile(file) {
  showStatus('image', '正在上传...', 'info');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/api/upload_image', {method:'POST', body:fd});
    const d = await r.json();
    if (d.error) { showStatus('image', d.error, 'error'); return; }
    document.getElementById('imageFileName').textContent = d.filename;
    loadImageThumb(d.thumb, d.width, d.height);
    document.getElementById('imageDrawPanel').style.display = 'block';
    document.getElementById('imageParamsPanel').style.display = 'block';
    document.getElementById('imageResultArea').style.display = 'none';
    imageBoxes = [];
    renderImageBoxes();
    showStatus('image', '图片已加载，请在图片上框选目标', 'info');
  } catch(e) { showStatus('image', '上传失败: '+e, 'error'); }
}

function loadImageThumb(dataUrl, natW, natH) {
  const img = document.getElementById('imageThumbImg');
  img.onload = () => {
    imageImgNatural = {w: natW, h: natH};
    const wrap = document.getElementById('imageCanvasWrap');
    const panelW = Math.max(wrap.parentElement.offsetWidth || 600, 100);
    const displayW = Math.min(panelW - 20, natW);
    const displayH = Math.round(natH * (displayW / natW));
    img.style.width = displayW + 'px';
    img.style.height = displayH + 'px';
    const canvas = document.getElementById('imageCanvas');
    canvas.width = displayW;
    canvas.height = displayH;
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    canvas.style.display = 'block';
    canvas.style.background = 'rgba(0,0,0,0.2)';
    setupImageCanvas();
  };
  img.src = 'data:image/jpeg;base64,' + dataUrl;
}

// ===================== 图片画框 =====================
function setupImageCanvas() {
  const canvas = document.getElementById('imageCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false, sx = 0, sy = 0;

  canvas.onmousedown = e => {
    const r = canvas.getBoundingClientRect();
    sx = e.clientX - r.left;
    sy = e.clientY - r.top;
    drawing = true;
  };
  canvas.onmousemove = e => {
    if (!drawing) return;
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawImageBoxes(ctx);
    ctx.strokeStyle = BOX_COLORS_HEX[selectedColorIdx];
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, mx - sx, my - sy);
  };
  canvas.onmouseup = e => {
    if (!drawing) return;
    drawing = false;
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const x1 = Math.min(sx, mx), y1 = Math.min(sy, my);
    const x2 = Math.max(sx, mx), y2 = Math.max(sy, my);
    if (x2 - x1 > 5 && y2 - y1 > 5) {
      const dispW = r.width, dispH = r.height;
      const natW = imageImgNatural.w, natH = imageImgNatural.h;
      imageBoxes.push({
        x1: Math.round(x1 * natW / dispW),
        y1: Math.round(y1 * natH / dispH),
        x2: Math.round(x2 * natW / dispW),
        y2: Math.round(y2 * natH / dispH),
        colorIdx: selectedColorIdx
      });
      renderImageBoxes();
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawImageBoxes(ctx);
  };
  canvas.onmouseleave = () => {
    if (drawing) { drawing = false; ctx.clearRect(0,0,canvas.width,canvas.height); drawImageBoxes(ctx); }
  };

  document.addEventListener('keydown', e => {
    if (document.getElementById('tab-image').classList.contains('active') && (e.key === 'c' || e.key === 'C')) {
      imageBoxes.pop();
      renderImageBoxes();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawImageBoxes(ctx);
    }
  });
}

function drawImageBoxes(ctx) {
  const canvas = ctx.canvas;
  const dispW = canvas.width, dispH = canvas.height;
  const natW = imageImgNatural.w, natH = imageImgNatural.h;
  imageBoxes.forEach(b => {
    ctx.strokeStyle = BOX_COLORS_HEX[b.colorIdx];
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x1 * dispW / natW, b.y1 * dispH / natH, (b.x2 - b.x1) * dispW / natW, (b.y2 - b.y1) * dispH / natH);
    ctx.fillStyle = BOX_COLORS_HEX[b.colorIdx];
    ctx.font = '12px Arial';
    ctx.fillText('目标' + (b.colorIdx + 1), b.x1 * dispW / natW, b.y1 * dispH / natH - 3);
  });
}

function renderImageBoxes() {
  const list = document.getElementById('imageBoxList');
  list.innerHTML = imageBoxes.map((b, i) => {
    const c = BOX_COLORS_HEX[b.colorIdx];
    return `<div class="box-item">
      <div class="color-swatch" style="background:${c}"></div>
      <span>目标${i+1}: [${b.x1},${b.y1},${b.x2},${b.y2}]</span>
    </div>`;
  }).join('');
}

function clearImageBoxes() {
  imageBoxes = [];
  renderImageBoxes();
  const canvas = document.getElementById('imageCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

// ==================== 视频预览 JS ====================
let viewDir = 'temp_data';
let viewFrameIdx = 0;
let viewTotalFrames = 0;
let viewPlaying = false;
let viewPlayTimer = null;
let viewNextTrackId = 1000000;
let viewConf = 0.0;
let viewZoom = 1.0;
let promptMode = false;
let promptBoxes = [];

function openViewer(dir) {
  viewDir = dir || viewDir;
  fetch('/api/video_frames?dir=' + encodeURIComponent(viewDir) + '&conf=' + viewConf)
    .then(r => r.json())
    .then(d => {
      if (d.error) { alert(d.error); return; }
      viewTotalFrames = d.total;
      viewNextTrackId = d.next_track_id;
      document.getElementById('viewNextTid').value = viewNextTrackId;
      loadViewFrame(0);
    });
}

function loadViewFrame(idx) {
  if (viewTotalFrames === 0) return;
  if (idx < 0) idx = 0;
  if (idx >= viewTotalFrames) idx = viewTotalFrames - 1;
  viewFrameIdx = idx;
  const cats = (document.getElementById('viewCategories').value || '').trim();
  fetch('/api/video_frame?dir=' + encodeURIComponent(viewDir) + '&frame=' + idx + '&conf=' + viewConf + '&zoom=' + viewZoom + '&categories=' + encodeURIComponent(cats))
    .then(r => r.json())
    .then(d => {
      if (d.error) return;
      document.getElementById('viewImg').src = 'data:image/jpeg;base64,' + d.thumb;
      document.getElementById('viewFrameInfo').textContent = (d.frame + 1) + '/' + d.total;
      document.getElementById('viewAnnCount').textContent = d.ann_count + '个标注';
      // resize canvas
      const canvas = document.getElementById('viewCanvas');
      const img = document.getElementById('viewImg');
      if (canvas && img) {
        canvas.width = img.offsetWidth;
        canvas.height = img.offsetHeight;
      }
    });
}

function viewPrev() { loadViewFrame(viewFrameIdx - 1); }
function viewNext() { loadViewFrame(viewFrameIdx + 1); }

function toggleViewPlay() {
  if (viewPlaying) {
    clearInterval(viewPlayTimer);
    viewPlayTimer = null;
    viewPlaying = false;
    document.getElementById('viewPlayBtn').textContent = '▶播放';
  } else {
    viewPlaying = true;
    document.getElementById('viewPlayBtn').textContent = '■暂停';
    viewPlayTimer = setInterval(() => { loadViewFrame(viewFrameIdx + 1); }, 500);
  }
}

function viewTogglePrompt() {
  if (!promptMode) {
    promptMode = true;
    promptBoxes = [];
    document.getElementById('viewPromptBtn').textContent = '执行提示帧';
    document.getElementById('viewPromptBtn').style.background = '#00CC00';
    alert('提示帧模式：在图片上拖动画框，完成后点"执行提示帧"');
  } else {
    const iou = parseFloat(document.getElementById('viewIou').value || '0.5');
    const mergeIou = parseFloat(document.getElementById('viewMergeIou').value || '0.5');
    const items = document.getElementById('viewItems').value || '';
    fetch('/api/video_prompt_frame', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({dir: viewDir, frame_idx: viewFrameIdx, boxes: promptBoxes, iou: iou, merge_iou: mergeIou, items: items})
    }).then(r => r.json()).then(d => {
      if (d.error) { alert(d.error); }
      else { alert('提示帧双向标注完成'); loadViewFrame(viewFrameIdx); }
      promptMode = false;
      promptBoxes = [];
      document.getElementById('viewPromptBtn').textContent = '提示帧';
      document.getElementById('viewPromptBtn').style.background = '';
    });
  }
}

function viewDeleteTrace() {
  const tid = parseInt(document.getElementById('viewDeleteInput').value);
  if (!tid) { alert('请输入trace_id'); return; }
  fetch('/api/video_delete_trace', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({dir: viewDir, trace_id: tid})
  }).then(r => r.json()).then(d => {
    alert('已删除 trace_id=' + tid);
    loadViewFrame(viewFrameIdx);
  });
}

function viewSetNextTid() {
  viewNextTrackId = parseInt(document.getElementById('viewNextTid').value) || 1000000;
}

function viewPostprocess() {
  fetch('/api/video_postprocess', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({src_dir: viewDir, conf: viewConf})
  }).then(r => r.json()).then(d => {
    alert('后处理完成，删除了 ' + d.removed + ' 个低置信度标注');
    loadViewFrame(viewFrameIdx);
  });
}

// canvas 画框（提示帧模式）
const _viewCanvas = document.getElementById('viewCanvas');
if (_viewCanvas) {
  const _ctx = _viewCanvas.getContext('2d');
  let _drw = false, _sx = 0, _sy = 0;
  _viewCanvas.addEventListener('mousedown', e => {
    if (!promptMode) return;
    const r = _viewCanvas.getBoundingClientRect();
    _sx = e.clientX - r.left; _sy = e.clientY - r.top; _drw = true;
  });
  _viewCanvas.addEventListener('mousemove', e => {
    if (!_drw) return;
    const r = _viewCanvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    _ctx.clearRect(0, 0, _viewCanvas.width, _viewCanvas.height);
    _ctx.strokeStyle = '#FFFF00'; _ctx.lineWidth = 2;
    _ctx.strokeRect(_sx, _sy, mx - _sx, my - _sy);
  });
  _viewCanvas.addEventListener('mouseup', e => {
    if (!_drw) return; _drw = false;
    const r = _viewCanvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const nw = _viewCanvas.width, nh = _viewCanvas.height;
    const imgW = document.getElementById('viewImg').naturalWidth || nw;
    const imgH = document.getElementById('viewImg').naturalHeight || nh;
    const x1 = Math.round(Math.min(_sx, mx) * imgW / nw);
    const y1 = Math.round(Math.min(_sy, my) * imgH / nh);
    const x2 = Math.round(Math.max(_sx, mx) * imgW / nw);
    const y2 = Math.round(Math.max(_sy, my) * imgH / nh);
    if (x2 - x1 > 5 && y2 - y1 > 5) {
      promptBoxes.push([x1, y1, x2, y2]);
      alert('已添加框: [' + x1 + ',' + y1 + ',' + x2 + ',' + y2 + '] 共' + promptBoxes.length + '个');
    }
    _ctx.clearRect(0, 0, _viewCanvas.width, _viewCanvas.height);
  });
  _viewCanvas.addEventListener('mouseleave', () => { if (_drw) { _drw = false; _ctx.clearRect(0,0,_viewCanvas.width,_viewCanvas.height); } });
}
